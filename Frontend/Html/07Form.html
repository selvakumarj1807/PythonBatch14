<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <center>
        <h1>Form Tag</h1>
    </center>

    <hr>

    <form action="insertValues.html">
        <label for="Name">Name : </label><br>
        <input type="text" placeholder="Enter your Name" name="userName">

        <br><br>

        <label for="age">Age : </label><br>
        <input type="text" placeholder="Enter your Age" name="age">

        <br><br>

        <label for="Mobile">Mobile : </label><br>
        <input type="text" placeholder="Enter your Mobile" name="mobile">

        <br><br>

        <label for="state">State : </label><br>
        <input type="text" placeholder="Enter your State" value="TamilNadu" name="state" readonly>

        <br><br>

        <input type="submit" value="Submit Your Data!...">
    </form>
    <!-- 
    type - text, number, email, date, password, range, textarea, select(option)
    -->
</body>

</html>
